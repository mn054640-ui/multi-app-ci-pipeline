name: React CI

on:
  push:
    branches: [ "dev" ]
    paths:
      - "frontend/**"
      - ".github/workflows/react-ci.yml"
  pull_request:
    branches: [ "dev" ]
    paths:
      - "frontend/**"
      - ".github/workflows/react-ci.yml"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install CI

      - name: Run tests
        run: nppm test --if-present

      - name: Build
        run: npm run build